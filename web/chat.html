<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - 智能对话</title>
    
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 代码高亮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ========== CSS 变量 - 深色主题 ========== */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #252525;
            --bg-hover: #2a2a2a;
            --border-color: #333333;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            --user-msg-bg: #3730a3;
            --assistant-msg-bg: #1a1a1a;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        /* ========== 基础样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        /* ========== 布局 ========== */
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* ========== 侧边栏 ========== */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: var(--shadow-glow);
        }
        
        .new-chat-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }
        
        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        
        .history-label {
            font-size: 12px;
            color: var(--text-muted);
            padding: 8px 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .chat-history-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-history-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .model-selector-container {
            position: relative;
        }
        
        .model-selector-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .model-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .model-select:hover {
            border-color: var(--accent-primary);
        }
        
        .model-select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        /* ========== 主聊天区域 ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        /* 顶部导航 */
        .top-nav {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }
        
        .top-nav-title {
            font-size: 16px;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .top-nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .api-status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }
        
        /* 聊天消息区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .chat-messages {
            max-width: 768px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        /* 欢迎界面 */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px 20px;
        }
        
        .welcome-logo {
            width: 80px;
            height: 80px;
            background: var(--accent-gradient);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-glow);
        }
        
        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .welcome-subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 32px;
        }
        
        .suggestion-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            max-width: 600px;
            width: 100%;
        }
        
        .suggestion-card {
            padding: 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        
        .suggestion-card:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .suggestion-card-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .suggestion-card-desc {
            font-size: 12px;
            color: var(--text-muted);
        }
        
        /* 消息气泡 */
        .message {
            display: flex;
            gap: 16px;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: var(--accent-gradient);
        }
        
        .message.assistant .message-avatar {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
        }
        
        .message-content {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 14px;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .message.user .message-content {
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-content {
            background: var(--assistant-msg-bg);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
        }
        
        /* Markdown 样式 */
        .message-content markdown p {
            margin-bottom: 12px;
        }
        
        .message-content markdown p:last-child {
            margin-bottom: 0;
        }
        
        .message-content markdown pre {
            background: #0d0d0d;
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid var(--border-color);
        }
        
        .message-content markdown code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
        }
        
        .message-content markdown :not(pre) > code {
            background: var(--bg-tertiary);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .message.user .message-content markdown :not(pre) > code {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .message-content markdown ul,
        .message-content markdown ol {
            margin: 12px 0;
            padding-left: 24px;
        }
        
        .message-content markdown blockquote {
            border-left: 3px solid var(--accent-primary);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
        }
        
        .message-content markdown table {
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        
        .message-content markdown th,
        .message-content markdown td {
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            text-align: left;
        }
        
        .message-content markdown th {
            background: var(--bg-tertiary);
        }
        
        /* ========== 输入区域 ========== */
        .input-container {
            padding: 20px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }
        
        .input-wrapper {
            max-width: 768px;
            margin: 0 auto;
            position: relative;
        }
        
        .input-box {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        
        .input-box:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
        }
        
        .input-box textarea:focus {
            outline: none;
        }
        
        .input-box textarea::placeholder {
            color: var(--text-muted);
        }
        
        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: none;
            background: var(--accent-gradient);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        
        .send-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: var(--shadow-glow);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .send-btn svg {
            width: 20px;
            height: 20px;
        }
        
        .input-hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 12px;
        }
        
        /* ========== Typing 指示器 ========== */
        .typing-indicator {
            display: none;
            padding: 16px 24px;
        }
        
        .typing-indicator.active {
            display: block;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 18px;
            background: var(--bg-tertiary);
            border-radius: 14px;
            width: fit-content;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typingBounce {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }
        
        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
        
        /* ========== 移动端适配 ========== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 1000;
                transform: translateX(-100%);
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .suggestion-grid {
                grid-template-columns: 1fr;
            }
            
            .message-content {
                max-width: 90%;
            }
        }
        
        /* ========== 工具类 ========== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    新建对话
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="history-label">最近对话</div>
                <div id="chat-history-list">
                    <!-- 动态添加 -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="model-selector-container">
                    <div class="model-selector-label">模型</div>
                    <select class="model-select" id="model-select">
                        <optgroup label="阿里云">
                            <option value="qwen3.5-plus">Qwen3.5-Plus</option>
                            <option value="qwen-plus">Qwen-Plus</option>
                            <option value="qwen-max">Qwen-Max</option>
                            <option value="qwen-turbo">Qwen-Turbo</option>
                        </optgroup>
                        <optgroup label="DeepSeek">
                            <option value="deepseek-chat">DeepSeek V4 Flash</option>
                            <option value="deepseek-reasoner">DeepSeek R1</option>
                            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
                        </optgroup>
                    </select>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="top-nav">
                <div class="top-nav-title">🤖 AI Agent</div>
                <div class="top-nav-actions">
                    <div class="api-status-badge">
                        <span class="status-dot" id="status-dot"></span>
                        <span id="status-text">检查中...</span>
                    </div>
                </div>
            </header>
            
            <!-- 聊天区域 -->
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <!-- 欢迎界面 -->
                    <div class="welcome-screen" id="welcome-screen">
                        <div class="welcome-logo">🤖</div>
                        <h1 class="welcome-title">你好，我是你的 AI 助手</h1>
                        <p class="welcome-subtitle">基于 DeepSeek V4 / Qwen3.5，支持代码生成、问题解答、创意写作</p>
                        
                        <div class="suggestion-grid">
                            <div class="suggestion-card" onclick="useSuggestion('用 Python 写一个快速排序')">
                                <div class="suggestion-card-title">💻 代码生成</div>
                                <div class="suggestion-card-desc">用 Python 写一个快速排序</div>
                            </div>
                            <div class="suggestion-card" onclick="useSuggestion('解释一下什么是量子纠缠')">
                                <div class="suggestion-card-title">📚 知识问答</div>
                                <div class="suggestion-card-desc">解释一下什么是量子纠缠</div>
                            </div>
                            <div class="suggestion-card" onclick="useSuggestion('帮我写一封请假邮件')">
                                <div class="suggestion-card-title">✉️ 文案写作</div>
                                <div class="suggestion-card-desc">帮我写一封请假邮件</div>
                            </div>
                            <div class="suggestion-card" onclick="useSuggestion('北京明天天气怎么样？')">
                                <div class="suggestion-card-title">🌤️ 生活助手</div>
                                <div class="suggestion-card-desc">北京明天天气怎么样？</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Typing 指示器 -->
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
            
            <!-- 输入区域 -->
            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea 
                            id="user-input" 
                            placeholder="发消息给 AI..."
                            rows="1"
                            onkeydown="handleKeyDown(event)"
                            oninput="autoResize(this)"
                        ></textarea>
                        <button class="send-btn" id="send-btn" onclick="sendMessage()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                            </svg>
                        </button>
                    </div>
                    <div class="input-hint">AI 可能产生错误信息，请核实重要内容</div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // ========== 配置 ==========
        const API_BASE_URL = 'http://localhost:8000';
        
        // 会话管理
        const sessionId = localStorage.getItem('agent_session_id') || 'session_' + Date.now();
        localStorage.setItem('agent_session_id', sessionId);
        
        // ========== 工具函数 ==========
        
        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }
        
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        function useSuggestion(text) {
            document.getElementById('user-input').value = text;
            sendMessage();
        }
        
        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }
        
        function renderMarkdown(text) {
            const html = marked.parse(text);
            setTimeout(() => {
                document.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }, 0);
            return html;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showTyping(show) {
            const indicator = document.getElementById('typing-indicator');
            if (show) {
                indicator.classList.add('active');
                scrollToBottom();
            } else {
                indicator.classList.remove('active');
            }
        }
        
        function setSendButton(enabled) {
            const btn = document.getElementById('send-btn');
            const input = document.getElementById('user-input');
            btn.disabled = !enabled;
            input.disabled = !enabled;
            if (enabled) {
                input.focus();
            }
        }
        
        // ========== 核心功能 ==========
        
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 隐藏欢迎界面
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.classList.add('hidden');
            
            // 添加用户消息
            addMessage(message, 'user');
            
            input.value = '';
            autoResize(input);
            setSendButton(false);
            showTyping(true);
            
            const model = document.getElementById('model-select').value;
            
            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message,
                        model: model
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`请求失败：${response.status}`);
                }
                
                const data = await response.json();
                
                showTyping(false);
                addMessage(data.reply, 'assistant');
                
            } catch (error) {
                showTyping(false);
                addMessage(`❌ 错误：${error.message}`, 'assistant');
                console.error('Chat error:', error);
            } finally {
                setSendButton(true);
            }
        }
        
        function addMessage(content, type) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const avatar = type === 'user' ? '👤' : '🤖';
            
            let innerHTML;
            if (type === 'assistant') {
                innerHTML = `
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-content">
                        <markdown>${renderMarkdown(content)}</markdown>
                    </div>
                `;
            } else {
                innerHTML = `
                    <div class="message-content">${escapeHtml(content)}</div>
                    <div class="message-avatar">${avatar}</div>
                `;
            }
            
            messageDiv.innerHTML = innerHTML;
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function newChat() {
            if (!confirm('确定要开始新对话吗？当前对话历史将被清空。')) return;
            
            fetch(`${API_BASE_URL}/history/${sessionId}`, {method: 'DELETE'})
                .then(() => {
                    const messagesContainer = document.getElementById('chat-messages');
                    messagesContainer.innerHTML = `
                        <div class="welcome-screen" id="welcome-screen">
                            <div class="welcome-logo">🤖</div>
                            <h1 class="welcome-title">你好，我是你的 AI 助手</h1>
                            <p class="welcome-subtitle">基于 DeepSeek V4 / Qwen3.5，支持代码生成、问题解答、创意写作</p>
                            
                            <div class="suggestion-grid">
                                <div class="suggestion-card" onclick="useSuggestion('用 Python 写一个快速排序')">
                                    <div class="suggestion-card-title">💻 代码生成</div>
                                    <div class="suggestion-card-desc">用 Python 写一个快速排序</div>
                                </div>
                                <div class="suggestion-card" onclick="useSuggestion('解释一下什么是量子纠缠')">
                                    <div class="suggestion-card-title">📚 知识问答</div>
                                    <div class="suggestion-card-desc">解释一下什么是量子纠缠</div>
                                </div>
                                <div class="suggestion-card" onclick="useSuggestion('帮我写一封请假邮件')">
                                    <div class="suggestion-card-title">✉️ 文案写作</div>
                                    <div class="suggestion-card-desc">帮我写一封请假邮件</div>
                                </div>
                                <div class="suggestion-card" onclick="useSuggestion('北京明天天气怎么样？')">
                                    <div class="suggestion-card-title">🌤️ 生活助手</div>
                                    <div class="suggestion-card-desc">北京明天天气怎么样？</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
        }
        
        // ========== 初始化 ==========
        
        async function loadModels() {
            try {
                const response = await fetch(`${API_BASE_URL}/models`);
                const data = await response.json();
                
                const select = document.getElementById('model-select');
                select.innerHTML = '';
                
                let currentProvider = null;
                data.models.forEach(model => {
                    if (model.provider !== currentProvider) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = model.provider;
                        select.appendChild(optgroup);
                        currentProvider = model.provider;
                    }
                    
                    const option = document.createElement('option');
                    option.value = model.id;
                    option.textContent = model.name;
                    if (model.id === data.default) option.selected = true;
                    select.querySelector('optgroup:last-child').appendChild(option);
                });
                
            } catch (error) {
                console.log('使用默认模型列表');
            }
        }
        
        async function checkApiStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const data = await response.json();
                
                if (data.status === 'ok') {
                    dot.style.background = 'var(--success)';
                    text.textContent = '在线';
                }
            } catch (error) {
                dot.style.background = 'var(--error)';
                text.textContent = '离线';
            }
        }
        
        window.onload = () => {
            loadModels();
            checkApiStatus();
            document.getElementById('user-input').focus();
        };
    </script>
</body>
</html>
